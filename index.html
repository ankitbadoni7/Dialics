<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dialics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ================= NAVBAR ================= -->
    <header class="navbar">
        <div class="container nav-container">

            <!-- Logo Image -->
            <div class="logo">
                <img src="Images/logo.svg" alt="Dialics Logo">
            </div>

            <nav class="nav-links">
                <ul>
                    <li class="dropdown">
                        <a href="#">
                            Features
                            <img src="Images/arrow.svg" alt="arrow" class="nav-arrow">
                        </a>
                    </li>

                    <li>
                        <a href="#">Pricing</a>
                    </li>

                    <li class="dropdown">
                        <a href="#">
                            Resources
                            <img src="Images/arrow.svg" alt="arrow" class="nav-arrow">
                        </a>
                    </li>

                    <li class="dropdown">
                        <a href="#">
                            Company
                            <img src="Images/arrow.svg" alt="arrow" class="nav-arrow">
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="nav-actions">
                <a href="#" class="login">Login</a>
                <a href="#" class="btn-outline">Book a Demo</a>
                <a href="#" class="btn-primary">Start Free Trial</a>
            </div>

        </div>
    </header>


    <!-- ================= HERO SECTION ================= -->
    <section class="hero">
        <div class="hero-content">

            <h1>
                Looking to boost your <br>
                <span>pay per call</span> ROI?
            </h1>

            <p>
                Optimize ad campaigns with call tracking, virtual phone
                numbers & instant analytics.
            </p>

            <div class="hero-buttons">
                <a href="#" class="btn-primary large">Get Started</a>
                <a href="#" class="btn-outline large">See it in Action</a>
            </div>

            <!-- Dashboard Image -->
            <div class="hero-image">
                <!-- Top Glow -->
                <span class="glow glow-top"></span>

                <!-- Left Glow -->
                <span class="glow glow-left"></span>

                <!-- Right Glow -->
                <span class="glow glow-right"></span>

                <!-- Main Image -->
                <img src="Images/billing.jpg" alt="Billing Dashboard">
            </div>

        </div>
    </section>

</body>

</html>
